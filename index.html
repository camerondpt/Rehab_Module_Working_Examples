<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Landing Page</title>
    <style>
        /* Modern Reset and Layout */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* Container for the links */
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: #444;
        }

        /* Link Button Styling */
        .link-button {
            display: block;
            text-decoration: none;
            background-color: #764ba2;
            color: white;
            padding: 12px 20px;
            margin: 10px 0;
            border-radius: 2px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }

        /* Hover effects */
        .link-button:hover {
            background-color: #5a3782;
            transform: translateY(-2px);
        }

        .link-button:active {
            transform: translateY(0);
        }
    </style>
</head>
